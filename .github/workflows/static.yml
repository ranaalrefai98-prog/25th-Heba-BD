<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heba's 25th Birthday Invite</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        text-align: center;
        padding: 20px;
        color: #333;
    }

    .card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        max-width: 400px;
        margin: auto;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    h1 {
        color: #ff4d6d;
    }

    .pickup {
        font-weight: bold;
        margin: 15px 0;
        font-size: 18px;
    }

    .scratch {
        background: #ccc;
        color: transparent;
        border-radius: 12px;
        padding: 15px;
        margin: 10px 0;
        cursor: pointer;
        user-select: none;
        position: relative;
        transition: all 0.3s ease;
    }

    .scratch.revealed {
        background: #ffdde1;
        color: #333;
    }

    .hint {
        font-size: 12px;
        color: #777;
        margin-bottom: 15px;
    }

</style>
</head>
<body>

<div class="card">
    <h1>🎉 You're Invited! 🎉</h1>
    <p>Hello, you are invited to</p>
    <h2>Heba’s 25th Birthday Party 💖</h2>

    <div class="pickup">🚗 Pickup at 5:00 PM</div>

    <p class="hint">Tap each box to "scratch" and reveal the surprise!</p>

    <div class="scratch" onclick="reveal(this)">Step One: ???</div>
    <div class="scratch" onclick="reveal(this)">Step Two: ???</div>
    <div class="scratch" onclick="reveal(this)">Step Three: ???</div>
    <div class="scratch" onclick="reveal(this)">Step Four: ???</div>
</div>

<script>
const steps = [
    "🍣 Sushi Crush",
    "🎳 Bowling",
    "🎂 Birthday Cake",
    "🎁 Gift Time"
];

function reveal(element) {
    const index = Array.from(document.querySelectorAll('.scratch')).indexOf(element);
    element.classList.add("revealed");
    element.innerText = steps[index];
}
</script>

</body>
</html>
