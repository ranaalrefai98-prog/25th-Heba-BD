<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heba's 25th Birthday Invite</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    padding: 20px;
    color: #333;
    overflow-x: hidden;
}

.card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    max-width: 400px;
    margin: auto;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    animation: fadeIn 1.2s ease;
}

h1 { color: #ff4d6d; }

.pickup {
    font-weight: bold;
    margin: 15px 0;
    font-size: 18px;
}

canvas {
    background: #ccc;
    border-radius: 12px;
    margin: 10px 0;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.reveal-text {
    position: relative;
    top: -60px;
    font-weight: bold;
    font-size: 16px;
}

.emoji {
    position: fixed;
    font-size: 24px;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 You're Invited! 🎉</h1>
    <p>Hello, you are invited to</p>
    <h2>Heba’s 25th Birthday 💖</h2>

    <div class="pickup">🚗 Pickup at 5:00 PM</div>

    <p>Scratch each box 👇</p>

    <div>
        <canvas width="300" height="60"></canvas>
        <div class="reveal-text">🍣 Sushi Crush</div>
    </div>

    <div>
        <canvas width="300" height="60"></canvas>
        <div class="reveal-text">🎳 Bowling</div>
    </div>

    <div>
        <canvas width="300" height="60"></canvas>
        <div class="reveal-text">🎂 Birthday Cake</div>
    </div>

    <div>
        <canvas width="300" height="60"></canvas>
        <div class="reveal-text">🎁 Gift Time</div>
    </div>

    <button onclick="playMusic()">🎶 Tap for Music</button>
</div>

<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
document.querySelectorAll("canvas").forEach(canvas => {
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#bbb";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let isDrawing = false;

    canvas.addEventListener("mousedown", () => isDrawing = true);
    canvas.addEventListener("mouseup", () => isDrawing = false);
    canvas.addEventListener("mousemove", scratch);

    canvas.addEventListener("touchstart", () => isDrawing = true);
    canvas.addEventListener("touchend", () => isDrawing = false);
    canvas.addEventListener("touchmove", scratch);

    function scratch(e) {
        if (!isDrawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

        ctx.globalCompositeOperation = "destination-out";
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2);
        ctx.fill();
    }
});

function playMusic() {
    document.getElementById("music").play();
}

setInterval(() => {
    const emoji = document.createElement("div");
    emoji.className = "emoji";
    emoji.innerText = ["🎉","🎂","🎁","💖"][Math.floor(Math.random()*4)];
    emoji.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(emoji);

    setTimeout(() => emoji.remove(), 6000);
}, 800);
</script>

</body>
</html>
